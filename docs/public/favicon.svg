<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background Rounded Rect -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bgGradient)" stroke="#1e293b" stroke-width="2"/>

  <defs>
    <!-- Background Gradient: Deep slate to rich dark navy -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Folder Outline Gradient: Electric Blue to Cyan -->
    <linearGradient id="folderGrad" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Arrow Gradient: High-energy orange-red to bright amber -->
    <linearGradient id="arrowGrad" x1="10" y1="19" x2="20" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff512f"/>
      <stop offset="100%" stop-color="#f09819"/>
    </linearGradient>

    <!-- Drop Shadow Filter for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Folder, Letters and Arrow Group -->
  <g transform="translate(16, 16) scale(3.2)" filter="url(#dropShadow)">
    <!-- Folder Outline -->
    <path d="M1.5 0C.678 0 0 .678 0 1.5v23c0 .822.678 1.5 1.5 1.5h7c.667 0 .66-1 0-1h-7c-.286 0-.5-.214-.5-.5v-23c0-.286.214-.5.5-.5h7c.5 0 .647.007.777.072.13.066.37.282.87.782l3 3c.516.516.865.81 1.248.98.382.17.733.166 1.105.166h13c.286 0 .5.214.5.5v18c0 .286-.214.5-.5.5h-6c-.646 0-.672 1 0 1h6c.822 0 1.5-.678 1.5-1.5v-18c0-.822-.678-1.5-1.5-1.5h-13c-.373 0-.52-.002-.7-.082-.182-.08-.46-.285-.946-.772l-3-3c-.5-.5-.762-.784-1.13-.968C9.353-.007 9 0 8.5 0z" fill="url(#folderGrad)" />
    
    <!-- Letters (FTP) -->
    <!-- Letter F -->
    <path d="M7.5 10c-.276 0-.5.224-.5.5v6c0 .66 1 .668 1 0V14h1.5c.665 0 .65-1 0-1H8v-2h2.5c.66.01.66-1 0-1z" fill="#f8fafc" />
    <!-- Letter T -->
    <path d="M13.5 10c-.66 0-.66 1 0 1H15v5.5c0 .67 1 .665 1 0V11h1.5c.66.01.662-1 0-1z" fill="#f8fafc" />
    <!-- Letter P -->
    <path d="M20.5 10c-.276 0-.5.224-.5.5v6c0 .672 1 .653 1 0V14h.5c.832 0 1.468-.206 1.896-.59.43-.383.604-.92.604-1.41 0-.49-.175-1.027-.604-1.41-.428-.384-1.064-.59-1.896-.59zm.5 1h.5c.668 0 1.032.16 1.23.336.195.175.27.39.27.664 0 .273-.075.49-.27.664-.198.176-.562.336-1.23.336H21z" fill="#f8fafc" />
    
    <!-- Upward Deployment Arrow -->
    <path d="M15.5 19c-.13.002-.26.055-.353.146l-3.994 3.995c-.464.446.26 1.17.706.707l3.64-3.642 3.64 3.642c.454.472 1.175-.257.707-.706l-3.994-3.994c-.096-.095-.218-.148-.353-.146zm0 3c.277 0 .5.223.5.5v7c0 .277-.223.5-.5.5s-.5-.223-.5-.5v-7c0-.277.223-.5.5-.5z" fill="url(#arrowGrad)" />
  </g>
</svg>
