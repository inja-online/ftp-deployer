name: manual-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.2.3"
        required: true
        type: string
      prerelease:
        description: "Mark GitHub release as prerelease"
        required: true
        default: false
        type: boolean
      notes:
        description: "Optional release notes. If empty, GitHub generates notes."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Create release ${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          case "$VERSION" in
            v?*) ;;
            *)
              echo "Version must start with v, e.g. v0.1 or v0.0.1"
              exit 1
              ;;
          esac
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release already exists: $VERSION"
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: ftp, zip, mbstring, xml, ctype, json, tokenizer, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate package
        run: composer validate --strict --no-check-lock

      - name: Run tests
        run: composer test

      - name: Run static analysis
        run: composer stan

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
          NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          args=("$VERSION" --title "$VERSION" --verify-tag)

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          if [[ -n "$NOTES" ]]; then
            printf '%s\n' "$NOTES" > release-notes.md
            args+=(--notes-file release-notes.md)
          else
            args+=(--generate-notes)
          fi

          gh release create "${args[@]}"
